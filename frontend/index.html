<!DOCTYPE html>
<html>

<head>
<title>NoFeeSwap Demo</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* BODY */

body{
font-family:'Rajdhani',sans-serif;
background:#04060f;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:40px;
overflow-x:hidden;
}

/* BLOCKCHAIN GRID BACKGROUND */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:
linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
background-size:80px 80px;
transform:rotate(20deg);
z-index:-2;
}

/* GLOW AURA */

body::after{
content:"";
position:fixed;
width:1200px;
height:1200px;
background:radial-gradient(circle,#00ffff33,transparent 60%);
z-index:-1;
}

/* TITLE */

h1{
font-family:'Orbitron';
font-size:42px;
color:#00ffff;
margin-bottom:30px;
text-shadow:
0 0 10px #00ffff,
0 0 30px #00ffff;
}

/* CONNECT BUTTON */

#connect{
padding:12px 26px;
border-radius:12px;
border:none;
font-size:16px;
font-family:'Orbitron';

background:linear-gradient(45deg,#00ffff,#0066ff);
color:white;

cursor:pointer;
transition:0.3s;

box-shadow:0 0 12px #00ffff;

margin-bottom:30px;
}

#connect:hover{
transform:translateY(-3px);
box-shadow:
0 0 20px #00ffff,
0 0 40px #0066ff;
}

/* MAIN CARD */

.card{
width:480px;
padding:35px;
border-radius:18px;

background:rgba(20,20,40,0.7);
backdrop-filter:blur(15px);

border:1px solid rgba(0,255,255,0.3);

box-shadow:
0 0 30px rgba(0,255,255,0.15),
inset 0 0 30px rgba(0,255,255,0.05);
}

/* ADDRESS */

.wallet-box{
background:#060b22;
padding:14px;
border-radius:10px;
margin-bottom:25px;

border:1px solid rgba(0,255,255,0.2);
}

.wallet-label{
font-size:13px;
color:#9ccaff;
margin-bottom:4px;
}

.wallet-value{
font-size:15px;
color:#00ffff;
word-break:break-all;
}

/* BALANCE GRID */

.balance-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:30px;
}

/* BALANCE CARD */

.balance-card{
background:#050a25;
border-radius:14px;
padding:20px;

border:1px solid rgba(0,255,255,0.2);

box-shadow:
0 0 15px rgba(0,255,255,0.1);
}

.balance-title{
font-size:14px;
color:#7aa7ff;
margin-bottom:8px;
}

/* BIG CLEAR NUMBERS */

.balance-number{
font-size:32px;
font-weight:700;
color:#00ffff;
letter-spacing:1px;
font-family:'Rajdhani';

text-shadow:
0 0 10px #00ffff;
}

/* INPUT */

input{
width:100%;
padding:14px;

border-radius:10px;
border:1px solid rgba(0,255,255,0.3);

background:#070c2b;
color:#00ffff;

font-size:16px;
font-family:'Rajdhani';

margin-bottom:20px;
outline:none;
}

input:focus{
border-color:#00ffff;
box-shadow:0 0 10px #00ffff;
}

/* TRANSFER BUTTON */

#transfer{
width:100%;
padding:14px;

border:none;
border-radius:12px;

font-size:16px;
font-family:'Orbitron';

background:linear-gradient(45deg,#00ffff,#0077ff);
color:white;

cursor:pointer;

transition:0.3s;

box-shadow:0 0 15px #00ffff;
}

#transfer:hover{
transform:translateY(-2px);

box-shadow:
0 0 25px #00ffff,
0 0 40px #0077ff;
}

</style>

</head>

<body>

<h1>⚡ NoFeeSwap Demo dApp</h1>

<button id="connect">Connect Wallet</button>

<div class="card">

<div class="wallet-box">
<div class="wallet-label">Wallet Address</div>
<div id="wallet" class="wallet-value">Not connected</div>
</div>

<div class="balance-grid">

<div class="balance-card">
<div class="balance-title">TokenA Balance</div>
<div id="balanceA" class="balance-number">0</div>
</div>

<div class="balance-card">
<div class="balance-title">TokenB Balance</div>
<div id="balanceB" class="balance-number">0</div>
</div>

</div>

<input id="amount" placeholder="Enter amount to transfer">

<button id="transfer">
Transfer TokenA → TokenB
</button>

</div>

<script src="app.js"></script>

</body>

</html>
